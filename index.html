<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Coordenadas</title>
  </head>
  <body>
    <div class="row m-2">
      <div class="col">
        <label for="xCoord">X</label>
        <input type="number" name="xCoord" id="xCoord" />
        <label for="yCoord">Y</label>
        <input type="number" name="yCoord" id="yCoord" />
        <label for="time">Tiempo</label>
        <input type="number" name="time" id="time" />
        <label for="points">Cantidad</label>
        <input type="number" name="points" id="points" />
        <button id="startButton" type="button" onclick="createTable()">Iniciar</button>
        <button id="stopButton" type="button" onclick="stopProgram()">Detener</button>
      </div>
    </div>
    <div class="row m-2">
        <div class="col" id="table-container">

        </div>
    </div>
    <script src="./coordinates.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
